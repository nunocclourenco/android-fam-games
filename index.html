<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#2563eb" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<title>Sala de Jogos</title>
<style>
  :root {
    --bg: #eff6ff;
    --blue: #2563eb;
    --blue-dark: #1e40af;
    --red: #ef4444;
    --yellow: #facc15;
    --ink: #1e293b;
    --card: #ffffff;
    /* 4 em Linha: jogador 1 azul, jogador 2 lilás, tabuleiro cinza/rosa claro */
    --c4-p1: #2563eb;
    --c4-p2: #b06ae0;
    --c4-board: #e6dbe1;
    --c4-empty: #faf5f8;
    /* Moara: jogador 1 verde, jogador 2 laranja */
    --moara-a: #16a34a;
    --moara-b: #fb923c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    justify-content: center;
    min-height: 100%;
    overscroll-behavior: none;
  }
  #app {
    width: 100%;
    max-width: 460px;
    padding: 20px 16px 32px;
    display: flex;
    flex-direction: column;
  }
  .screen { display: none; flex-direction: column; gap: 18px; }
  .screen.active { display: flex; }

  h1 { font-size: 30px; margin: 8px 0 0; text-align: center; color: var(--blue-dark); }
  .subtitle { text-align: center; margin: 0; color: #64748b; }

  .menu-card {
    background: var(--card);
    border: none;
    border-radius: 20px;
    padding: 22px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 6px 18px rgba(37,99,235,0.12);
    cursor: pointer;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    text-align: left;
    transition: transform 0.08s;
  }
  .menu-card:active { transform: scale(0.97); }
  .menu-emoji { font-size: 40px; line-height: 1; }
  .menu-sub { display: block; font-size: 14px; font-weight: 500; color: #64748b; margin-top: 2px; }

  .topbar { display: flex; align-items: center; gap: 12px; }
  .btn-back {
    background: #fff; border: none; border-radius: 12px; padding: 10px 14px;
    font-size: 18px; font-weight: 700; color: var(--blue); cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .game-title { font-size: 22px; font-weight: 800; color: var(--blue-dark); margin: 0; }

  .status {
    text-align: center; font-size: 20px; font-weight: 700; min-height: 28px;
    padding: 10px; border-radius: 14px; background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .status .disc { display: inline-block; width: 18px; height: 18px; border-radius: 50%; vertical-align: -3px; margin: 0 4px; }
  .status-x { color: var(--red); font-weight: 800; font-size: 24px; line-height: 1; vertical-align: -3px; margin: 0 3px; }
  .status-o { display: inline-block; width: 20px; height: 20px; border: 5px solid var(--blue); border-radius: 50%; box-sizing: border-box; vertical-align: -4px; margin: 0 3px; }

  /* ---- 4 em Linha ---- */
  #c4board {
    background: var(--c4-board);
    border-radius: 18px;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    box-shadow: 0 8px 20px rgba(176,106,224,0.25);
  }
  .c4cell {
    aspect-ratio: 1 / 1;
    background: var(--c4-empty);
    border-radius: 50%;
    cursor: pointer;
    position: relative;
  }
  .c4disc {
    position: absolute;
    inset: 0;
    border-radius: 50%;
  }
  .c4disc.p1 { background: var(--c4-p1); }
  .c4disc.p2 { background: var(--c4-p2); }
  .c4disc.win { box-shadow: 0 0 0 4px #22c55e inset; }
  .c4disc.dropping { animation: c4drop var(--dur, 0.4s) ease-in both; }
  @keyframes c4drop {
    0%   { transform: translateY(var(--from)); }
    55%  { transform: translateY(0); }
    68%  { transform: translateY(-28%); }
    80%  { transform: translateY(0); }
    88%  { transform: translateY(-12%); }
    100% { transform: translateY(0); }
  }

  /* ---- Jogo do Galo ---- */
  #tttboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    background: var(--blue);
    padding: 8px;
    border-radius: 18px;
    box-shadow: 0 8px 20px rgba(37,99,235,0.3);
  }
  .tttcell {
    aspect-ratio: 1 / 1;
    background: #fff;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .mark-x {
    font-size: clamp(56px, 17vw, 88px);
    font-weight: 800;
    line-height: 1;
    color: var(--red);
    animation: tttpop 0.38s ease-out both;
  }
  .mark-o {
    width: 64%;
    aspect-ratio: 1 / 1;
    border: clamp(8px, 2.6vw, 13px) solid var(--blue);
    border-radius: 50%;
    box-sizing: border-box;
    animation: tttpop 0.38s ease-out both;
  }
  @keyframes tttpop {
    0%   { transform: translateY(0) scale(0.3); opacity: 0; }
    45%  { transform: translateY(-28%) scale(1.12); opacity: 1; }
    75%  { transform: translateY(0) scale(1); }
    100% { transform: translateY(0) scale(1); }
  }
  .tttcell.win { background: #dcfce7; }

  .btn-restart {
    background: var(--blue); color: #fff; border: none; border-radius: 14px;
    padding: 14px; font-size: 18px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
  }
  .btn-restart:active { transform: scale(0.98); }

  /* ---- Moara ---- */
  .moara-layout { display: flex; align-items: center; justify-content: center; gap: 6px; }
  .moara-tray {
    display: flex; flex-direction: column; gap: 6px; align-items: center;
    min-width: 26px;
  }
  .tray-piece {
    width: 20px; height: 20px; border-radius: 50%;
    box-shadow: 0 1px 2px rgba(0,0,0,0.25);
  }
  #moaraboard { flex: 1 1 auto; min-width: 0; display: flex; justify-content: center; }
  .moara-svg {
    width: 100%; max-width: 320px; height: auto; display: block;
    background: #f3e9ef; border-radius: 18px; padding: 8px;
    box-shadow: 0 8px 20px rgba(176,106,224,0.22);
  }
  .mline { stroke: #000000; stroke-width: 2.4; stroke-linecap: round; }
  .mpoint-empty { fill: #000000; }
  .mpoint-a { fill: var(--moara-a); }
  .mpoint-b { fill: var(--moara-b); }
  .mpoint-sel { stroke: #22c55e; stroke-width: 3.5; }
  .mpoint-remove { stroke: #ef4444; stroke-width: 3.5; }

  /* ---- Painel de vitória ---- */
  .win-overlay {
    position: fixed; inset: 0; z-index: 100;
    display: none; align-items: center; justify-content: center;
    background: rgba(30,41,59,0.55); padding: 24px;
  }
  .win-overlay.show { display: flex; animation: winfade 0.2s ease-out; }
  .win-card {
    background: #fff; border-radius: 26px; padding: 30px 26px 26px;
    text-align: center; width: 100%; max-width: 330px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    animation: winpop 0.45s cubic-bezier(0.2,0.85,0.3,1.3) both;
  }
  .win-big { font-size: 42px; font-weight: 900; color: var(--blue-dark); line-height: 1.05; }
  .win-sub { font-size: 26px; font-weight: 800; color: var(--ink); margin-top: 6px; }
  .win-sub .disc { vertical-align: middle; margin-left: 4px; }
  .win-card .btn-restart { margin-top: 24px; width: 100%; }
  @keyframes winfade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes winpop { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>
<div id="app">

  <!-- MENU -->
  <section id="menu" class="screen active">
    <h1>Sala de Jogos</h1>
    <p class="subtitle">Escolham um jogo — dois jogadores</p>
    <button class="menu-card" onclick="show('c4')">
      <span class="menu-emoji">🔵</span>
      <span>4 em Linha<span class="menu-sub">Encaixa 4 seguidos para ganhar</span></span>
    </button>
    <button class="menu-card" onclick="show('ttt')">
      <span class="menu-emoji">❌</span>
      <span>Jogo do Galo<span class="menu-sub">3 em linha para ganhar</span></span>
    </button>
    <button class="menu-card" onclick="show('moara')">
      <span class="menu-emoji" aria-hidden="true">
        <svg viewBox="0 0 40 40" width="42" height="42" style="display:block">
          <ellipse cx="20" cy="34" rx="15" ry="3.2" fill="rgba(0,0,0,0.12)"/>
          <circle cx="20" cy="22" r="15" fill="#15803d"/>
          <circle cx="20" cy="19" r="15" fill="#16a34a"/>
          <circle cx="20" cy="19" r="9.5" fill="none" stroke="#bbf7d0" stroke-width="2"/>
          <circle cx="20" cy="19" r="3.4" fill="#bbf7d0"/>
        </svg>
      </span>
      <span>Moinho<span class="menu-sub">Faz moinhos e come as peças</span></span>
    </button>
  </section>

  <!-- 4 EM LINHA -->
  <section id="c4" class="screen">
    <div class="topbar">
      <button class="btn-back" onclick="show('menu')">← Menu</button>
      <h2 class="game-title">4 em Linha</h2>
    </div>
    <div id="c4status" class="status"></div>
    <div id="c4board"></div>
    <button class="btn-restart" onclick="C4.reset()">↻ Jogar de novo</button>
  </section>

  <!-- JOGO DO GALO -->
  <section id="ttt" class="screen">
    <div class="topbar">
      <button class="btn-back" onclick="show('menu')">← Menu</button>
      <h2 class="game-title">Jogo do Galo</h2>
    </div>
    <div id="tttstatus" class="status"></div>
    <div id="tttboard"></div>
    <button class="btn-restart" onclick="TTT.reset()">↻ Jogar de novo</button>
  </section>

  <!-- MOARA (MOINHO) -->
  <section id="moara" class="screen">
    <div class="topbar">
      <button class="btn-back" onclick="show('menu')">← Menu</button>
      <h2 class="game-title">Moinho</h2>
    </div>
    <div id="moarastatus" class="status"></div>
    <div class="moara-layout">
      <div id="moaratray-b" class="moara-tray"></div>
      <div id="moaraboard"></div>
      <div id="moaratray-a" class="moara-tray"></div>
    </div>
    <button class="btn-restart" onclick="MOARA.reset()">↻ Jogar de novo</button>
  </section>

</div>

<!-- Painel de vitória (comum a todos os jogos) -->
<div id="winoverlay" class="win-overlay" onclick="hideWin()">
  <div class="win-card" onclick="event.stopPropagation()">
    <div class="win-big">Conseguiste!</div>
    <div class="win-sub">Ganhaste! <span id="winwho"></span></div>
    <button class="btn-restart" onclick="winRestart(event)">↻ Jogar de novo</button>
  </div>
</div>

<script>
// ---------- Navegação entre ecrãs ----------
let activeGame = null;
function show(id) {
  hideWin();
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if (id === "c4") { C4.reset(); activeGame = "c4"; }
  if (id === "ttt") { TTT.reset(); activeGame = "ttt"; }
  if (id === "moara") { MOARA.reset(); activeGame = "moara"; }
  window.scrollTo(0, 0);
}

// ---------- Painel de vitória (comum a todos os jogos) ----------
function showWin(whoHTML) {
  document.getElementById("winwho").innerHTML = whoHTML;
  document.getElementById("winoverlay").classList.add("show");
}
function hideWin() {
  document.getElementById("winoverlay").classList.remove("show");
}
function winRestart(e) {
  e.stopPropagation();
  hideWin();
  if (activeGame === "c4") C4.reset();
  else if (activeGame === "ttt") TTT.reset();
  else if (activeGame === "moara") MOARA.reset();
}
// Peça grande do vencedor mostrada no painel
function bigDisc(color) {
  return `<span style="display:inline-block;width:30px;height:30px;border-radius:50%;background:${color};vertical-align:middle;margin-left:6px"></span>`;
}

// ================= 4 EM LINHA =================
const C4 = (function () {
  const ROWS = 6, COLS = 7;
  const boardEl = document.getElementById("c4board");
  const statusEl = document.getElementById("c4status");
  let grid, current, over;

  function reset() {
    grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0)); // 0 vazio, 1 vermelho, 2 amarelo
    current = 1;
    over = false;
    render();
    updateStatus();
  }

  function render() {
    boardEl.innerHTML = "";
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement("div");
        cell.className = "c4cell";
        cell.onclick = () => drop(c);
        cell.dataset.r = r; cell.dataset.c = c;
        if (grid[r][c] !== 0) {
          const d = document.createElement("div");
          d.className = "c4disc " + (grid[r][c] === 1 ? "p1" : "p2");
          cell.appendChild(d);
        }
        boardEl.appendChild(cell);
      }
    }
  }

  function cellEl(r, c) {
    return boardEl.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  }
  function discAt(r, c) {
    const cell = cellEl(r, c);
    return cell ? cell.querySelector(".c4disc") : null;
  }

  function drop(col) {
    if (over) return;
    // encontra a linha mais baixa livre nesta coluna (regra da gravidade)
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][col] === 0) {
        grid[r][col] = current;
        const cell = cellEl(r, col);
        const d = document.createElement("div");
        d.className = "c4disc dropping " + (current === 1 ? "p1" : "p2");
        // cai desde acima do topo (r+1 casas + espaços) até esta posição
        d.style.setProperty("--from", `calc((-100% - 6px) * ${r + 1})`);
        d.style.setProperty("--dur", (0.22 + (r + 1) * 0.05).toFixed(2) + "s");
        cell.appendChild(d);
        const line = winningLine(r, col);
        if (line) { over = true; line.forEach(([wr, wc]) => { const wd = discAt(wr, wc); if (wd) wd.classList.add("win"); }); win(); }
        else if (isFull()) { over = true; draw(); }
        else { current = current === 1 ? 2 : 1; updateStatus(); }
        return;
      }
    }
    // coluna cheia -> nada acontece
  }

  function isFull() { return grid[0].every(v => v !== 0); }

  function winningLine(r, c) {
    const p = grid[r][c];
    const dirs = [[0,1],[1,0],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      const line = [[r, c]];
      for (const s of [1, -1]) {
        let nr = r + dr*s, nc = c + dc*s;
        while (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && grid[nr][nc] === p) {
          line.push([nr, nc]); nr += dr*s; nc += dc*s;
        }
      }
      if (line.length >= 4) return line;
    }
    return null;
  }

  const discHTML = p => `<span class="disc" style="background:${p===1?'var(--c4-p1)':'var(--c4-p2)'}"></span>`;
  function updateStatus() { statusEl.innerHTML = `Vez do ${discHTML(current)}`; }
  function win() {
    statusEl.innerHTML = `${discHTML(current)} ganhou! 🎉`;
    showWin(bigDisc(current === 1 ? "var(--c4-p1)" : "var(--c4-p2)"));
  }
  function draw() { statusEl.textContent = "Empate! 🤝"; }

  return { reset };
})();

// ================= JOGO DO GALO =================
const TTT = (function () {
  const boardEl = document.getElementById("tttboard");
  const statusEl = document.getElementById("tttstatus");
  const LINES = [
    [0,1,2],[3,4,5],[6,7,8],  // linhas
    [0,3,6],[1,4,7],[2,5,8],  // colunas
    [0,4,8],[2,4,6]           // diagonais
  ];
  let cells, current, over;

  function reset() {
    cells = Array(9).fill("");
    current = "X";
    over = false;
    render();
    updateStatus();
  }

  // X = glifo maior; O = círculo perfeito desenhado com uma borda
  function markHTML(v) {
    if (v === "X") return '<span class="mark-x">✕</span>';
    if (v === "O") return '<span class="mark-o"></span>';
    return "";
  }

  function render() {
    boardEl.innerHTML = "";
    cells.forEach((v, i) => {
      const el = document.createElement("div");
      el.className = "tttcell" + (v ? " " + v.toLowerCase() : "");
      el.innerHTML = markHTML(v);
      el.onclick = () => play(i);
      el.dataset.i = i;
      boardEl.appendChild(el);
    });
  }

  function play(i) {
    if (over || cells[i]) return;
    cells[i] = current;
    const el = boardEl.querySelector(`[data-i="${i}"]`);
    el.innerHTML = markHTML(current);
    el.classList.add(current.toLowerCase());
    const line = winningLine();
    if (line) {
      over = true;
      line.forEach(idx => boardEl.querySelector(`[data-i="${idx}"]`).classList.add("win"));
      statusEl.innerHTML = `${statusMark(current)} ganhou! 🎉`;
      const big = current === "X"
        ? '<span style="font-size:34px;font-weight:900;color:var(--red);line-height:1;vertical-align:middle">✕</span>'
        : '<span style="display:inline-block;width:26px;height:26px;border:6px solid var(--blue);border-radius:50%;box-sizing:border-box;vertical-align:middle"></span>';
      showWin(big);
    }
    else if (cells.every(c => c)) { over = true; statusEl.textContent = "Empate! 🤝"; }
    else { current = current === "X" ? "O" : "X"; updateStatus(); }
  }

  function winningLine() {
    for (const [a, b, c] of LINES) {
      if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) return [a, b, c];
    }
    return null;
  }

  // Mini X/bola para o indicador de vez, no mesmo estilo do tabuleiro
  function statusMark(v) {
    if (v === "X") return '<span class="status-x">✕</span>';
    if (v === "O") return '<span class="status-o"></span>';
    return "";
  }
  function updateStatus() { statusEl.innerHTML = `Vez do ${statusMark(current)}`; }

  return { reset };
})();

// ================= MOARA (MOINHO / NINE MEN'S MORRIS) =================
const MOARA = (function () {
  const boardEl = document.getElementById("moaraboard");
  const statusEl = document.getElementById("moarastatus");
  const trayA = document.getElementById("moaratray-a");
  const trayB = document.getElementById("moaratray-b");

  // Posições dos 24 pontos (viewBox 200x200)
  const POINTS = [
    [10,10],[100,10],[190,10],[190,100],[190,190],[100,190],[10,190],[10,100],
    [40,40],[100,40],[160,40],[160,100],[160,160],[100,160],[40,160],[40,100],
    [70,70],[100,70],[130,70],[130,100],[130,130],[100,130],[70,130],[70,100]
  ];
  // Pontos vizinhos (as próprias linhas do tabuleiro)
  const ADJ = [
    [1,7],[0,2,9],[1,3],[2,4,11],[3,5],[4,6,13],[5,7],[6,0,15],
    [9,15],[8,10,1,17],[9,11],[10,12,3,19],[11,13],[12,14,5,21],[13,15],[14,8,7,23],
    [17,23],[16,18,9],[17,19],[18,20,11],[19,21],[20,22,13],[21,23],[22,16,15]
  ];
  // Todos os moinhos possíveis (linhas de 3)
  const MILLS = [
    [0,1,2],[2,3,4],[4,5,6],[6,7,0],
    [8,9,10],[10,11,12],[12,13,14],[14,15,8],
    [16,17,18],[18,19,20],[20,21,22],[22,23,16],
    [1,9,17],[3,11,19],[5,13,21],[7,15,23]
  ];
  const MILLS_OF = POINTS.map((_, i) => MILLS.filter(m => m.includes(i)));

  let board, current, toPlace, phase, mode, selected, over;

  const opp = p => (p === "A" ? "B" : "A");
  const disc = p => `<span class="disc" style="background:${p === "A" ? "var(--moara-a)" : "var(--moara-b)"}"></span>`;
  const onBoard = p => board.filter(v => v === p).length;
  const canFly = p => toPlace[p] === 0 && onBoard(p) === 3;
  const completesMill = (i, p) => MILLS_OF[i].some(m => m.every(c => board[c] === p));
  const inMill = i => { const p = board[i]; return MILLS_OF[i].some(m => m.every(c => board[c] === p)); };

  function removableSet() {
    const o = opp(current);
    const pieces = [];
    for (let i = 0; i < 24; i++) if (board[i] === o) pieces.push(i);
    const free = pieces.filter(i => !inMill(i));
    return new Set(free.length ? free : pieces);
  }

  function hasAnyMove(p) {
    if (canFly(p)) return board.includes(null);
    for (let i = 0; i < 24; i++)
      if (board[i] === p) for (const j of ADJ[i]) if (board[j] === null) return true;
    return false;
  }

  function reset() {
    board = Array(24).fill(null);
    current = "A";
    toPlace = { A: 9, B: 9 };
    phase = "placing";
    mode = "play";
    selected = null;
    over = false;
    render();
    updateStatus();
  }

  function startRemove() {
    if (onBoard(opp(current)) === 0) { endTurn(); return; }
    mode = "remove";
    render();
    updateStatus();
  }

  function endTurn() {
    if (phase === "placing" && toPlace.A === 0 && toPlace.B === 0) phase = "moving";
    current = opp(current);
    selected = null;
    mode = "play";
    if (phase === "moving") {
      if (onBoard(current) < 3) { finish(opp(current)); return; }
      if (!hasAnyMove(current)) { finish(opp(current)); return; }
    }
    render();
    updateStatus();
  }

  function finish(winner) {
    over = true;
    render();
    statusEl.innerHTML = `${disc(winner)} ganhou! 🎉`;
    showWin(bigDisc(winner === "A" ? "var(--moara-a)" : "var(--moara-b)"));
  }

  function click(i) {
    if (over) return;

    if (mode === "remove") {
      if (removableSet().has(i)) { board[i] = null; endTurn(); }
      return;
    }

    if (phase === "placing") {
      if (board[i] !== null) return;
      board[i] = current;
      toPlace[current]--;
      if (completesMill(i, current)) startRemove();
      else endTurn();
      return;
    }

    // fase de movimento
    if (selected === null) {
      if (board[i] === current) { selected = i; render(); }
      return;
    }
    if (i === selected) { selected = null; render(); return; }
    if (board[i] === current) { selected = i; render(); return; }
    if (board[i] === null && (canFly(current) || ADJ[selected].includes(i))) {
      board[i] = current;
      board[selected] = null;
      selected = null;
      if (completesMill(i, current)) startRemove();
      else endTurn();
    }
  }

  function updateStatus() {
    if (mode === "remove") {
      statusEl.innerHTML = `${disc(current)} fez moinho! Tira uma peça ${disc(opp(current))}`;
    } else if (phase === "placing") {
      statusEl.innerHTML = `Vez ${disc(current)} — coloca uma peça (faltam ${toPlace[current]})`;
    } else {
      statusEl.innerHTML = `Vez ${disc(current)} — ${selected === null ? "escolhe uma peça" : "move para um ponto livre"}`;
    }
  }

  function render() {
    const rem = mode === "remove" ? removableSet() : new Set();
    let s = `<svg viewBox="0 0 200 200" class="moara-svg">`;
    for (let i = 0; i < 24; i++)
      for (const j of ADJ[i])
        if (i < j) {
          const [x1, y1] = POINTS[i], [x2, y2] = POINTS[j];
          s += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" class="mline"/>`;
        }
    for (let i = 0; i < 24; i++) {
      const [x, y] = POINTS[i];
      let cls = "mpoint " + (board[i] === null ? "mpoint-empty" : board[i] === "A" ? "mpoint-a" : "mpoint-b");
      if (i === selected) cls += " mpoint-sel";
      if (rem.has(i)) cls += " mpoint-remove";
      const r = board[i] === null ? 4.5 : 10;
      s += `<circle cx="${x}" cy="${y}" r="${r}" class="${cls}"/>`;
    }
    // camada invisível para facilitar o toque
    for (let i = 0; i < 24; i++) {
      const [x, y] = POINTS[i];
      s += `<circle cx="${x}" cy="${y}" r="13" fill="black" fill-opacity="0" style="cursor:pointer" onclick="MOARA.click(${i})"/>`;
    }
    s += `</svg>`;
    boardEl.innerHTML = s;
    renderTrays();
  }

  // Peças por colocar: laranja (B) à esquerda, verde (A) à direita
  function renderTrays() {
    trayB.innerHTML = trayHTML("B");
    trayA.innerHTML = trayHTML("A");
  }
  function trayHTML(p) {
    const c = p === "A" ? "var(--moara-a)" : "var(--moara-b)";
    let h = "";
    for (let k = 0; k < toPlace[p]; k++) h += `<span class="tray-piece" style="background:${c}"></span>`;
    return h;
  }

  return { reset, click };
})();

// ---------- Registar service worker (PWA) ----------
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
